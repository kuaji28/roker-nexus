  log('SHA: '+sha,'ok');
  log('Pusheando...');
  const r2=await fetch('https://api.github.com/repos/kuaji28/roker-nexus/contents/pages/sistema.py',{
    method:'PUT',headers,
    body:JSON.stringify({message:'debug: show TOKEN bool in sistema page',content:B64,sha,branch:'main'})
  });
  const res=await r2.json();
  if(r2.ok){log('✅ Push OK — commit: '+res.commit.sha,'ok');log('Streamlit redeploya en ~30s','ok');}
  else{log('❌ Error: '+JSON.stringify(res),'err');}
}
