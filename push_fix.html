function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
}

  const headers = {
    'Authorization': `token ${token}`,
    'Content-Type': 'application/json'
  };

  const r1 = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, { headers });

  const fileData = await r1.json();
  const sha = fileData.sha;
  log('✅ Current SHA: ' + sha, 'ok');

  log('📤 Pushing new content...');
  const body = JSON.stringify({
    message: "fix: show button when only TELEGRAM_TOKEN set, expose exceptions",
    content: NEW_B64,
    sha: sha,
    branch: "main"
  });
  const r2 = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
    method: 'PUT',
    headers,
    body
  });
  const result = await r2.json();
  if (r2.ok) {
    log('✅ Push successful!', 'ok');
    log('Commit SHA: ' + result.commit.sha, 'ok');
    log('Streamlit Cloud will redeploy in ~30s.', 'ok');
  } else {
    log('❌ Push failed: ' + JSON.stringify(result), 'err');
  }
}
</script>
